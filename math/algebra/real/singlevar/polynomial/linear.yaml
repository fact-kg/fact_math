- is:
    type: math/expression
- has:
    expression_str:
      type: str
      value: "f(x) = a*x + b"
- has:
    x:
      type: math/variable
- has:
    a:
      type: math/constant
- has:
    b:
      type: math/constant
- has:
    expression_yaml:
      type: str
      value: |
        math/algebra/operation/add:
          - math/algebra/operation/multiply:
              - a
              - x
          - b
