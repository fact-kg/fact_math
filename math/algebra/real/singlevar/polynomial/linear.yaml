- is:
    type: math/expression
- has:
    x:
      type: math/variable
- has:
    a:
      type: math/constant
- has:
    b:
      type: math/constant
- has:
    expression:
      type: math/expression
      as:
        - math/expression:
            expression_str:
              value: "f(x) = a*x + b"
            expression_yaml:
              value: |
                math/algebra/operation/add:
                  - math/algebra/operation/multiply:
                      - a
                      - x
                  - b
