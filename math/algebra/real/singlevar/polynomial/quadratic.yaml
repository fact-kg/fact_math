- is:
    type: math/expression
- has:
    x:
      type: math/variable
- has:
    a:
      type: math/constant
- has:
    b:
      type: math/constant
- has:
    c:
      type: math/constant
- has:
    expression:
      type: math/expression
      as:
        - math/expression:
            expression_str:
              value: "f(x) = a*x^2 + b*x + c"
            expression_yaml:
              value: |
                math/algebra/operation/add:
                  - math/algebra/operation/add:
                      - math/algebra/operation/multiply:
                          - a
                          - math/algebra/operation/power:
                              - x
                              - 2
                      - math/algebra/operation/multiply:
                          - b
                          - x
                  - c
